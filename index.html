<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎯 あみだくじ（名前・色固定版）</title>
<style>
body{
  text-align:center; font-family:sans-serif; background:#fffbe6; margin:0; padding:20px;
}
#container{
  display:inline-block; position:relative; margin-top:20px; width:100%; max-width:500px;
}
button.start-btn, button.reset-btn, button.mode-btn{
  cursor:pointer; border:2px solid black; border-radius:8px; 
}
button.start-btn{ width:70px; height:50px; font-size:16px; position:absolute; z-index:5; }
button.reset-btn, button.mode-btn{ width:auto; padding:12px 18px; margin:5px; font-size:16px; background:#fffbe6; }
.runner{ position:absolute; font-size:50px; transform:translate(-50%,-50%); z-index:10; }
.goal-btn{ position:absolute; text-align:center; border:2px solid black; border-radius:6px; background:#fff; cursor:default; z-index:1; }
.result{ margin-top:20px; font-size:22px; font-weight:bold; }
.button-row{ margin-top:20px; }
</style>
</head>
<body>
<h2>🎯 あみだくじ 🎯</h2>

<div class="button-row">
  <button class="mode-btn" onclick="switchMode('number')">数字モード</button>
  <button class="mode-btn" onclick="switchMode('name')">名前モード</button>
  <button class="reset-btn" onclick="generate()">🔄 リセット</button>
  <button class="reset-btn" onclick="addRandomBridge()">➕ 横線追加</button>
</div>

<div id="container">
  <svg id="amida" width="100%" height="400"></svg>
</div>

<div id="result" class="result"></div>

<script>
const lineCount = 6;
const svg = document.getElementById("amida");
const container = document.getElementById("container");
let bridges=[], runner, goalResults=[], goalBtns=[], startBtns=[], tried=[], lineX=[], lineHeight;
const margin = 50;
let mode = 'number'; // デフォルトは数字
const numbers = ["1","2","3","4","5","6"];
const names = ["田中","内田","井上","谷井","大平","和田"];
const colors = ["white","black","red","blue","yellow","green"]; // 1〜6の色固定対応

function switchMode(newMode){
  mode = newMode;
  generate();
}

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function shuffleDisplayAnimation(btns, duration=600){
  const items = mode==='number'? numbers : names;
  const start = Date.now();
  while(Date.now() - start < duration){
    for(let i=0;i<btns.length;i++){
      const randIndex = Math.floor(Math.random() * items.length);
      btns[i].innerText = items[randIndex];
    }
    await wait(80);
  }
}

function generate(){
  svg.innerHTML="";
  goalBtns.forEach(b=>b.remove());
  startBtns.forEach(b=>b.remove());
  if(runner) runner.remove();
  bridges=[]; goalResults=[]; goalBtns=[]; startBtns=[]; tried=new Array(lineCount).fill(false);
  lineX=[];
  document.getElementById("result").innerText="";

  const svgWidth = svg.clientWidth;
  lineHeight = svg.clientHeight - 50;
  const lineSpacing = (svgWidth - 2*margin)/(lineCount-1);

  for(let i=0;i<lineCount;i++){
    const x = margin + i*lineSpacing;
    lineX.push(x);
    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",x); line.setAttribute("y1",50); line.setAttribute("x2",x); line.setAttribute("y2",lineHeight);
    line.setAttribute("stroke","black"); line.setAttribute("stroke-width",4);
    svg.appendChild(line);
  }

  for(let y=80;y<lineHeight;y+=50){
    const x = Math.floor(Math.random()*(lineCount-1));
    bridges.push({y,x});
    const hLine = document.createElementNS("http://www.w3.org/2000/svg","line");
    hLine.setAttribute("x1",lineX[x]); hLine.setAttribute("y1",y);
    hLine.setAttribute("x2",lineX[x+1]); hLine.setAttribute("y2",y);
    hLine.setAttribute("stroke","black"); hLine.setAttribute("stroke-width",4);
    svg.appendChild(hLine);
  }

  for(let i=0;i<lineCount;i++){
    const btn = document.createElement("button");
    btn.className="start-btn"; 
    btn.innerText = "";
    btn.style.background = colors[i]; 
    btn.style.color = "white";
    const colIndex = i;
    btn.style.left = (lineX[i]-35)+"px"; 
    btn.style.top = "0px";
    btn.onclick = ()=>{ 
      if(!tried[colIndex]){
        tried[colIndex]=true;
        btn.disabled=true;
        start(colIndex, lineX, btn);
      }
    };
    container.appendChild(btn);
    startBtns.push(btn);
  }

  (async()=>{
    await shuffleDisplayAnimation(startBtns, 800);
    const items = mode==='number'? shuffle([...numbers]) : shuffle([...names]);
    for(let i=0;i<lineCount;i++){
      startBtns[i].innerText = items[i];
    }

    const hitIndex = Math.floor(Math.random()*lineCount);
    const lineTop=50, lineBottom=lineHeight, lineCenterY=lineTop+(lineBottom-lineTop)/2;
    const offsetY = 180;
    for(let i=0;i<lineCount;i++){
      const btn = document.createElement("div");
      btn.className="goal-btn"; 
      container.appendChild(btn); 
      goalBtns.push(btn);

      goalResults.push(i===hitIndex?"当選":"✖");

      const startBtn = startBtns[i];
      const btnWidth = startBtn.offsetWidth;
      const btnHeight = startBtn.offsetHeight;
      btn.style.width = btnWidth + "px";
      btn.style.height = btnHeight + "px";
      btn.style.lineHeight = btnHeight + "px";
      btn.style.fontSize = "16px";

      btn.style.left = (lineX[i]-btnWidth/2)+"px";
      btn.style.top = (lineCenterY - btnHeight/2 + offsetY)+"px";

      btn.style.background = "#fff";
      btn.style.color = "black";
      btn.innerText = "";
    }
  })();
}

function addRandomBridge(){
  if(!lineX || lineX.length===0) return;
  const xIndex = Math.floor(Math.random()*(lineCount-1));
  const y = 50 + Math.floor(Math.random()*(lineHeight-100));
  bridges.push({y, x:xIndex});
  const hLine = document.createElementNS("http://www.w3.org/2000/svg","line");
  hLine.setAttribute("x1",lineX[xIndex]); hLine.setAttribute("y1",y);
  hLine.setAttribute("x2",lineX[xIndex+1]); hLine.setAttribute("y2",y);
  hLine.setAttribute("stroke","black");
  hLine.setAttribute("stroke-width",4);
  svg.appendChild(hLine);
}

async function start(pos,lineX, startBtn){
  if(runner) runner.remove();
  runner = document.createElement("div"); 
  runner.className="runner"; 
  runner.textContent="🐱";
  container.appendChild(runner);
  let y=50;
  while(y<=lineHeight){
    for(const b of bridges){
      if(Math.abs(b.y - y) <= 2){
        if(pos===b.x) pos++;
        else if(pos===b.x+1) pos--;
      }
    }
    runner.style.left=lineX[pos]+"px";
    runner.style.top=y+"px";
    await wait(6);
    y+=1;
  }

  const resultBtn = goalBtns[pos];
  if(goalResults[pos] === "当選"){
    resultBtn.style.background = "red";
    resultBtn.style.color = "white";
    resultBtn.innerText = "当選";
    startBtn.style.background = "gold";
    startBtn.style.color = "white";
  } else {
    resultBtn.style.background = "#fff";
    resultBtn.style.color = "black";
    resultBtn.innerText = goalResults[pos];
    startBtn.style.background = "gray";
    startBtn.innerText = "";
  }

  document.getElementById("result").innerText = `結果：${goalResults[pos]}`;
}

generate();
</script>
</body>
</html>
